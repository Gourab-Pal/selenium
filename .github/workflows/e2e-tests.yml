name: E2E Tests

on:
  push:
    branches: [main, master]

  pull_request:

  workflow_dispatch:

  schedule:
    - cron: '50 14 * * *' # Daily at 08:20 PM IST

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run E2E tests
        env:
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
          BRANCH: ${{ github.ref_name }}
          ENVIRONMENT: github-actions
          TRIGGERED_BY: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: ./gradlew clean test --continue --no-daemon

      - name: Upload Failure Screenshots
        id: screenshot_upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: build/screenshots
          if-no-files-found: ignore

      - name: Print Artifact URL
        if: always()
        run: |
          echo "Artifact URL:"
          echo "${{ steps.screenshot_upload.outputs.artifact-url }}"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: build/allure-results

  publish-allure:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Download Chrome Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: build/allure-results

      - name: Download Firefox Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: build/allure-results

      - name: Generate Allure Report
        run: ./gradlew allureReport --no-daemon

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/reports/allure-report/allureReport

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to workflow summary
        run: |
          echo "## 🎉 Allure Report Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Report URL: https://gourab-pal.github.io/selenium/" >> $GITHUB_STEP_SUMMARY