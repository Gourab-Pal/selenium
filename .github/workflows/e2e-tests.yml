name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '50 14 * * *' # Daily at 08:20 PM IST

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/_run-tests.yml
    secrets: inherit

  publish:
    if: always()
    needs: test
    uses: ./.github/workflows/_publish-report.yml
    secrets: inherit

  notify:
    if: always()
    needs: publish
    uses: ./.github/workflows/_notify-slack.yml
    with:
      total:      ${{ needs.publish.outputs.total }}
      passed:     ${{ needs.publish.outputs.passed }}
      failed:     ${{ needs.publish.outputs.failed }}
      broken:     ${{ needs.publish.outputs.broken }}
      skipped:    ${{ needs.publish.outputs.skipped }}
      report_url: ${{ needs.publish.outputs.report_url }}
    secrets: inherit