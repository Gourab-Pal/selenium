name: E2E Tests

on:
  push:
    branches: [main, master]

  pull_request:

  workflow_dispatch:

  schedule:
    - cron: '50 14 * * *' # Daily at 08:20 PM IST

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run E2E tests
        env:
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
          BRANCH: ${{ github.ref_name }}
          ENVIRONMENT: github-actions
          TRIGGERED_BY: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: ./gradlew clean test --continue --no-daemon

      - name: Upload Failure Screenshots
        id: screenshot_upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: build/screenshots
          if-no-files-found: ignore

      - name: Print Artifact URL
        if: always()
        run: |
          echo "Artifact URL:"
          echo "${{ steps.screenshot_upload.outputs.artifact-url }}"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: build/allure-results

  publish-allure:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Download Chrome Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-chrome
          path: build/allure-results

      - name: Download Firefox Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-firefox
          path: build/allure-results

      - name: Generate Allure Report
        run: ./gradlew allureReport --no-daemon

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-report/allureReport

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/reports/allure-report/allureReport

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to workflow summary
        run: |
          echo "## 🎉 Allure Report Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Report URL: https://gourab-pal.github.io/selenium/" >> $GITHUB_STEP_SUMMARY

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: >-
            [${{ github.event_name }}]
            E2E Execution Completed - ${{ github.repository }}
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            ```html
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
            </head>

            <body style="margin:0;padding:0;background:#0f172a;font-family:Arial,Helvetica,sans-serif;color:#e2e8f0;">

            <table width="100%" cellpadding="0" cellspacing="0"
                   style="background:#0f172a;padding:24px 12px;">

            <tr>
            <td align="center">

            <table width="100%" cellpadding="0" cellspacing="0"
                   style="max-width:700px;background:#111827;border:1px solid #1f2937;border-radius:16px;overflow:hidden;">

              <!-- Header -->
              <tr>
                <td style="padding:32px;background:linear-gradient(135deg,#1e293b,#111827);">
                  <h1 style="margin:0;color:#f8fafc;font-size:28px;">
                    🚀 E2E Test Execution Completed
                  </h1>

                  <p style="margin:12px 0 0 0;color:#94a3b8;font-size:14px;">
                    Automated notification from GitHub Actions
                  </p>
                </td>
              </tr>

              <!-- Status -->
              <tr>
                <td style="padding:24px 24px 0 24px;">
                  <div style="padding:16px;background:#14532d;border-radius:10px;color:#dcfce7;">
                    <strong style="font-size:18px;">
                      ✅ Workflow Completed
                    </strong>
                  </div>
                </td>
              </tr>

              <tr>
                <td style="padding:24px;">

                  <!-- Repository -->
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:12px 16px;background:#0b1220;border-radius:10px;">
                        <strong style="color:#38bdf8;">Repository</strong><br>
                        ${{ github.repository }}
                      </td>
                    </tr>
                  </table>

                  <div style="height:16px;"></div>

                  <!-- Workflow -->
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:12px 16px;background:#0b1220;border-radius:10px;">
                        <strong style="color:#38bdf8;">Workflow</strong><br>
                        ${{ github.workflow }}
                      </td>
                    </tr>
                  </table>

                  <div style="height:16px;"></div>

                  <!-- Execution Details -->
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:16px;background:#0b1220;border-radius:10px;">
                        <strong style="color:#38bdf8;">Execution Details</strong>

                        <br><br>

                        Trigger: ${{ github.event_name }}<br>
                        Branch: ${{ github.ref_name }}<br>
                        Actor: ${{ github.actor }}<br>
                        Run ID: ${{ github.run_id }}
                      </td>
                    </tr>
                  </table>

                  <div style="height:24px;"></div>

                  <!-- Allure Button -->
                  <table align="center" cellpadding="0" cellspacing="0">
                    <tr>
                      <td bgcolor="#22c55e" style="border-radius:10px;">
                        <a href="${{ steps.deployment.outputs.page_url }}"
                           style="display:inline-block;padding:14px 24px;color:#ffffff;text-decoration:none;font-weight:bold;">
                          📊 Open Allure Report
                        </a>
                      </td>
                    </tr>
                  </table>

                  <div style="height:12px;"></div>

                  <!-- Allure URL -->
                  <div style="text-align:center;">
                    <strong style="color:#38bdf8;">Allure Report</strong>
                    <br>

                    <a href="${{ steps.deployment.outputs.page_url }}"
                       style="color:#60a5fa;word-break:break-all;">
                      ${{ steps.deployment.outputs.page_url }}
                    </a>
                  </div>

                  <div style="height:20px;"></div>

                  <!-- Workflow Button -->
                  <table align="center" cellpadding="0" cellspacing="0">
                    <tr>
                      <td bgcolor="#2563eb" style="border-radius:10px;">
                        <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                           style="display:inline-block;padding:14px 24px;color:#ffffff;text-decoration:none;font-weight:bold;">
                          ⚙️ Open Workflow Run
                        </a>
                      </td>
                    </tr>
                  </table>

                  <div style="height:12px;"></div>

                  <!-- Workflow URL -->
                  <div style="text-align:center;">
                    <strong style="color:#38bdf8;">Workflow Run</strong>
                    <br>

                    <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                       style="color:#60a5fa;word-break:break-all;">
                      Open GitHub Actions Run
                    </a>
                  </div>

                  <div style="height:24px;"></div>

                  <!-- Commit SHA -->
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:16px;background:#0b1220;border-radius:10px;word-break:break-all;">
                        <strong style="color:#38bdf8;">Commit SHA</strong>

                        <br><br>

                        <span style="font-size:12px;color:#cbd5e1;">
                          ${{ github.sha }}
                        </span>
                      </td>
                    </tr>
                  </table>

                  <div style="height:24px;"></div>

                  <!-- Future Summary -->
                  <table width="100%" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="padding:16px;background:#0b1220;border-radius:10px;">
                        <strong style="color:#38bdf8;">Execution Summary</strong>

                        <br><br>

                        Total Tests: Coming Soon<br>
                        Passed: Coming Soon<br>
                        Failed: Coming Soon<br>
                        Skipped: Coming Soon
                      </td>
                    </tr>
                  </table>

                </td>
              </tr>

              <!-- Footer -->
              <tr>
                <td style="padding:20px;text-align:center;background:#0b1220;color:#94a3b8;font-size:12px;">
                  Generated by GitHub Actions
                </td>
              </tr>

            </table>

            </td>
            </tr>
            </table>

            </body>
            </html>
            ```
